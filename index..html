<html dir="rtl" lang="ar">
<head>

<style>
:root{
  --bg:#F2EBDD; --paper:#FBF6EC; --paper-soft:#F6EFE1;
  --ink:#2B2520; --ink-soft:#6B5F4F;
  --line:#CBB996; --line-soft:#E2D6BB;
  --accent:#D9622B; --accent-ink:#7A3413; --accent-soft:#F3DCC9;
  --green:#1F5C4D; --green-soft:#DCE9DF;
  --red:#B23A2E; --red-soft:#F4DCD8;
  --gold:#B68A35;
  --display:'Cairo',sans-serif; --body:'Tajawal',sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;}
body{
  background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.6;
  background-image:linear-gradient(var(--line-soft) 1px, transparent 1px);
  background-size:100% 38px;background-attachment:local;
}
#app{max-width:1080px;margin:0 auto;padding:18px 18px 60px;}
button{font-family:var(--body);cursor:pointer;}
input,select{font-family:var(--body);}

.topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;border-bottom:3px double var(--line);padding-bottom:14px;margin-bottom:18px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-stamp{width:54px;height:54px;border-radius:50%;border:2px solid var(--accent-ink);display:flex;align-items:center;justify-content:center;transform:rotate(-9deg);font-family:var(--display);font-weight:900;font-size:13px;color:var(--accent-ink);position:relative;flex-shrink:0;}
.brand-stamp::after{content:"";position:absolute;inset:5px;border:1px solid var(--accent-ink);border-radius:50%;opacity:.55;}
.brand h1{font-family:var(--display);font-weight:900;font-size:22px;margin:0;color:var(--ink);letter-spacing:.3px;}
.brand p{margin:2px 0 0;color:var(--ink-soft);font-size:13px;}
.who{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.who .uname{font-size:13px;color:var(--ink-soft);}
.who .uname b{color:var(--ink);}
.linklike{border:none;background:none;color:var(--accent-ink);font-size:12.5px;text-decoration:underline;padding:0;}
#saveStatus{font-size:11.5px;color:var(--ink-soft);font-family:var(--mono);}

.chip-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px;}
.chip{border:1px solid var(--line);background:var(--paper);border-radius:20px;padding:7px 16px;font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--line);}
.chip.active{border-color:var(--accent-ink);color:var(--accent-ink);background:var(--accent-soft);font-weight:700;}
.chip.active .dot{background:var(--accent-ink);}
.add-chip-btn,.export-btn{border:1px dashed var(--ink-soft);background:transparent;border-radius:20px;padding:7px 14px;font-size:13.5px;color:var(--ink-soft);}
.add-chip-btn:hover{border-color:var(--accent-ink);color:var(--accent-ink);}
.export-btn{margin-right:auto;border:1px solid var(--green);color:var(--green);border-radius:8px;background:var(--paper);font-weight:700;display:flex;align-items:center;gap:6px;}
.export-btn:disabled{opacity:.5;cursor:default;}
.inline-add-form{display:flex;gap:6px;align-items:center;}
.inline-add-form input{border:1px solid var(--accent-ink);border-radius:20px;padding:6px 12px;font-size:13px;width:160px;}
.inline-add-form button{border:none;background:var(--accent);color:#fff;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;}

.tabs{display:flex;gap:4px;margin:22px 0 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.tab{background:transparent;border:none;padding:10px 18px;font-size:14.5px;color:var(--ink-soft);font-weight:700;font-family:var(--display);border-bottom:3px solid transparent;margin-bottom:-1px;}
.tab.active{color:var(--accent-ink);border-bottom-color:var(--accent);}
.tabpanel{display:none;}
.tabpanel.active{display:block;}

.card{background:var(--paper);border:1px solid var(--line-soft);border-radius:10px;padding:18px 20px;margin-bottom:18px;}
.card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.card-head h3{margin:0;font-family:var(--display);font-size:15.5px;color:var(--ink);}
.muted{color:var(--ink-soft);font-size:12.5px;}

.empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.empty-state h2{font-family:var(--display);color:var(--ink);font-size:19px;margin-bottom:8px;}

.auth-wrap{max-width:380px;margin:40px auto;}
.auth-card{background:var(--paper);border:1px solid var(--line-soft);border-radius:12px;padding:26px 24px;}
.auth-card h2{font-family:var(--display);font-size:18px;margin:0 0 4px;}
.auth-card p.hint{color:var(--ink-soft);font-size:12.5px;margin:0 0 18px;}
.auth-card form{display:flex;flex-direction:column;gap:10px;}
.auth-card input{border:1px solid var(--line);border-radius:7px;padding:10px 12px;font-size:14px;width:100%;}
.auth-card button[type=submit]{border:none;background:var(--accent);color:#fff;border-radius:7px;padding:10px;font-size:14.5px;font-weight:700;margin-top:6px;}
.auth-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--ink-soft);}
.security-note{margin-top:16px;font-size:11.5px;color:var(--ink-soft);background:var(--paper-soft);border:1px solid var(--line-soft);border-radius:8px;padding:10px 12px;}

.custody-grid{display:grid;grid-template-columns:240px 1fr;gap:20px;margin-bottom:18px;align-items:start;}
@media (max-width:760px){.custody-grid{grid-template-columns:1fr;}}
.tape{background:var(--paper);border:1px solid var(--line);border-radius:4px 4px 0 0;padding:18px 16px 14px;font-family:var(--mono);position:relative;}
.tape::after{content:"";display:block;position:absolute;left:0;right:0;bottom:-12px;height:12px;background:linear-gradient(135deg,var(--paper) 50%,transparent 50%) 0 0/12px 12px repeat-x,linear-gradient(45deg,var(--paper) 50%,transparent 50%) 0 0/12px 12px repeat-x;}
.tape-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--ink-soft);}
.tape-row span:last-child{font-weight:600;color:var(--ink);}
.tape-divider{border-top:1px dashed var(--line);margin:8px 0;}
.tape-row.total{font-size:16px;padding-top:2px;}
.tape-row.total span:last-child{font-size:20px;font-weight:700;}
.tape-row.total.pos span:last-child{color:var(--green);}
.tape-row.total.neg span:last-child{color:var(--red);}

.custody-forms{display:flex;flex-direction:column;gap:14px;}
.form-card{background:var(--paper-soft);border:1px solid var(--line-soft);border-radius:8px;padding:14px 16px;}
.form-card.alert-form{border-color:var(--red-soft);background:#FBF1EE;}
.form-card h3{margin:0 0 6px;font-size:13.5px;font-family:var(--display);color:var(--ink);}
.form-card .hint{margin:0 0 10px;font-size:12px;color:var(--ink-soft);}
.form-card form{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.form-card input,.form-card select{border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:13.5px;background:#fff;color:var(--ink);}
.form-card input[type=date]{width:135px;}
.form-card input[type=number]{width:110px;}
.form-card input[type=text]{flex:1;min-width:140px;}
.form-card select[name=projectId]{min-width:150px;}
.form-card button{border:none;border-radius:6px;padding:8px 16px;font-size:13.5px;font-weight:700;color:#fff;background:var(--accent);}
.form-card.alert-form button{background:var(--red);}
.proj-add-mini{display:flex;gap:6px;align-items:center;margin-top:6px;}
.proj-add-mini input{flex:1;border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12.5px;}
.proj-add-mini button{border:1px solid var(--accent-ink);background:#fff;color:var(--accent-ink);border-radius:6px;padding:6px 10px;font-size:12px;}
@media (max-width:560px){
  .form-card form{flex-direction:column;align-items:stretch;}
  .form-card input[type=date],.form-card input[type=number],.form-card input[type=text],.form-card select,.form-card button{width:100%;min-width:0;}
}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:right;font-family:var(--display);font-weight:700;font-size:12px;color:var(--ink-soft);border-bottom:1px solid var(--line);padding:8px 8px;white-space:nowrap;}
td{padding:8px 8px;border-bottom:1px solid var(--line-soft);vertical-align:middle;white-space:nowrap;}
tr:hover td{background:var(--paper-soft);}
.num{font-family:var(--mono);}
.amt-in{color:var(--green);font-family:var(--mono);}
.amt-out{color:var(--red);font-family:var(--mono);}
.del-btn{border:none;background:transparent;color:var(--red);font-size:12px;border:1px solid var(--red-soft);border-radius:5px;padding:3px 8px;}
.small-btn{border:1px solid var(--line);background:#fff;border-radius:5px;padding:3px 9px;font-size:12px;color:var(--ink-soft);}

.week-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.week-row input[type=date]{border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:13.5px;}
.week-label{font-family:var(--mono);font-size:13px;color:var(--ink-soft);}

.worker-row input,.worker-row select{border:1px solid var(--line-soft);border-radius:5px;padding:5px 7px;font-size:13px;background:#fff;width:100%;}
.archived-toggle{font-size:12.5px;color:var(--ink-soft);background:none;border:none;text-decoration:underline;padding:0;margin-top:6px;}

.day-cell{text-align:center;}
.day-stamp{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:transparent;}
.day-stamp.present{border-color:var(--green);background:var(--green-soft);color:var(--green);font-weight:700;}
.ot-input{width:46px;border:1px solid var(--line-soft);border-radius:4px;padding:2px 3px;font-size:11px;text-align:center;display:block;margin:3px auto 0;}
.transport-input{width:60px;border:1px solid var(--gold);border-radius:4px;padding:3px 4px;font-size:12px;text-align:center;}
.day-col-head{text-align:center;}
.total-col{font-weight:700;color:var(--accent-ink);}
.foot-row td{font-weight:700;border-top:2px solid var(--line);border-bottom:none;background:var(--paper-soft);}
.transport-row td{background:#FAF3E3;border-top:1px dashed var(--gold);}

.week-nav{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.week-nav-btn{border:1px solid var(--line);background:var(--paper);border-radius:8px;padding:9px 16px;font-size:13.5px;font-weight:700;color:var(--accent-ink);}
.week-nav-btn:hover{background:var(--accent-soft);}
.week-display{text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.week-range{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--ink);}
.week-nav input[type=date]{margin-top:4px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;}

.file-mini-label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--ink-soft);}
.file-mini-label input[type=file]{font-size:11px;width:200px;}
.attach-link{font-size:12px;color:var(--accent-ink);text-decoration:underline;}
.attach-thumb{width:34px;height:34px;object-fit:cover;border-radius:5px;border:1px solid var(--line);vertical-align:middle;}

#voucherOverlay{position:fixed;inset:0;background:rgba(43,37,32,.55);z-index:10001;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 14px;}
.voucher-paper{background:#fff;color:#222;width:100%;max-width:520px;border-radius:6px;padding:30px 34px;font-family:var(--body);box-shadow:0 8px 30px rgba(0,0,0,.35);}
.voucher-head{text-align:center;border-bottom:2px solid #333;padding-bottom:12px;margin-bottom:16px;}
.voucher-head .vh-company{font-family:var(--display);font-weight:900;font-size:18px;}
.voucher-head .vh-title{font-size:14px;margin-top:4px;}
.voucher-head .vh-serial{font-family:var(--mono);font-size:13px;margin-top:6px;color:#555;}
.voucher-paper table{width:100%;border-collapse:collapse;font-size:13.5px;}
.voucher-paper td{padding:7px 4px;border-bottom:1px solid #ddd;}
.voucher-paper td:first-child{color:#555;width:55%;}
.voucher-paper td:last-child{font-family:var(--mono);font-weight:600;text-align:left;}
.voucher-total-row td{border-top:2px solid #333;font-weight:800;font-size:15px;}
.voucher-sign-row{display:flex;justify-content:space-between;margin-top:34px;font-size:13px;}
.voucher-foot{margin-top:18px;font-size:12px;color:#777;text-align:center;}
.voucher-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;}
.voucher-actions button{border:none;border-radius:7px;padding:9px 18px;font-size:13.5px;font-weight:700;cursor:pointer;}
.voucher-print-btn{background:var(--accent);color:#fff;}
.voucher-close-btn{background:#eee;color:#333;}
@media print{
  body *{visibility:hidden;}
  #voucherOverlay, #voucherOverlay *{visibility:visible;}
  #voucherOverlay{position:absolute;inset:auto;background:#fff;padding:0;}
  .voucher-actions{display:none;}
}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 2px 12px rgba(0,0,0,.3);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center;}
#saveFailBanner{position:fixed;top:0;left:0;right:0;background:var(--red);color:#fff;padding:10px 16px;text-align:center;font-size:13px;z-index:10000;display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;}
#saveFailBanner button{border:1px solid #fff;background:transparent;color:#fff;border-radius:5px;padding:4px 10px;font-size:12.5px;}
#adminViewBanner{position:fixed;top:0;left:0;right:0;background:var(--gold);color:#2B2520;padding:9px 16px;text-align:center;font-size:13px;z-index:9998;display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;font-weight:700;}
#adminViewBanner button{border:1px solid #2B2520;background:transparent;color:#2B2520;border-radius:5px;padding:4px 10px;font-size:12.5px;font-weight:700;}
</style>
</head>
<body>
<div id="app"><p class="muted">...جاري التحميل</p></div>
<div id="toast"></div>

<script>
const DAYS=[
  {key:'sat',label:'السبت'},{key:'sun',label:'الأحد'},{key:'mon',label:'الاثنين'},
  {key:'tue',label:'الثلاثاء'},{key:'wed',label:'الأربعاء'},{key:'thu',label:'الخميس'},{key:'fri',label:'الجمعة'}
];
const STD_HOURS=8;

/* ====================================================================
   إعدادات الاتصال بقاعدة البيانات (Firebase) — اتبع خطوات الإعداد،
   وبعدين استبدل القيم السبعة دي ببيانات مشروعك من صفحة Firebase.
   ==================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyDOGd0K56KNEz2opxr3SjjMtCOgf1zUmIU",
  authDomain: "patty-cash-e77c4.firebaseapp.com",
  projectId: "patty-cash-e77c4",
  storageBucket: "patty-cash-e77c4.firebasestorage.app",
  messagingSenderId: "1070738664568",
  appId: "1:1070738664568:web:6290a629c39e8584f6118d"
};
let db=null, firebaseReady=false;
try{
  if(firebaseConfig.apiKey.indexOf('ضع_')!==0 && typeof firebase!=='undefined'){
    firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    firebaseReady=true;
  }
}catch(e){console.error('Firebase init failed',e);}

/* ====================================================================
   تخزين الصور (مجاني) عن طريق Cloudinary بدل Firebase Storage.
   هاتعمل حساب مجاني على cloudinary.com وتجيب القيمتين دول من لوحته:
   ==================================================================== */
const CLOUDINARY_CLOUD_NAME = "dla6hdrk7";
const CLOUDINARY_UPLOAD_PRESET = "invoices";
const storageReady = CLOUDINARY_CLOUD_NAME.indexOf('ضع_')!==0 && CLOUDINARY_UPLOAD_PRESET.indexOf('ضع_')!==0;

async function uploadFile(file,path){
  if(!storageReady)throw new Error('Cloudinary not configured');
  const formData=new FormData();
  formData.append('file',file);
  formData.append('upload_preset',CLOUDINARY_UPLOAD_PRESET);
  formData.append('folder',path);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`,{method:'POST',body:formData});
  if(!res.ok)throw new Error('Cloudinary upload failed: '+res.status);
  const data=await res.json();
  return data.secure_url;
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function toISO(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
function parseISO(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function weekStartOf(dateStr){const d=parseISO(dateStr);const dow=d.getDay();const offset=(dow+1)%7;d.setDate(d.getDate()-offset);return toISO(d);}
function weekDates(weekStartStr){const start=parseISO(weekStartStr);return DAYS.map((_,i)=>{const dt=new Date(start);dt.setDate(start.getDate()+i);return toISO(dt);});}
function fmt(n){return (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(s){if(!s)return'';const d=parseISO(s);return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.opacity='0';},3200);
}

let lastSavedAt=null;
function markSaved(){
  lastSavedAt=new Date();
  const el=document.getElementById('saveStatus');
  if(el)el.textContent='آخر حفظ ناجح: '+lastSavedAt.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function refreshSaveStatusEl(){
  const el=document.getElementById('saveStatus');
  if(el&&lastSavedAt)el.textContent='آخر حفظ ناجح: '+lastSavedAt.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

let pendingRetry=null;
function showSaveFailureBanner(key,value,shared){
  pendingRetry={key,value,shared};
  let b=document.getElementById('saveFailBanner');
  if(!b){
    b=document.createElement('div');
    b.id='saveFailBanner';
    document.body.prepend(b);
  }
  b.innerHTML=`<span>⚠ فشل حفظ آخر تعديل ولم يُسجَّل (المفتاح: ${escapeHtml(key)}). البيانات ظاهرة على شاشتك بس لو قفلت الصفحة دلوقتي هتضيع.</span><button id="retrySaveBtn">إعادة المحاولة</button>`;
  document.getElementById('retrySaveBtn').addEventListener('click',async()=>{
    if(!pendingRetry)return;
    const {key,value,shared}=pendingRetry;
    await sSet(key,value,shared);
  });
}
function hideSaveFailureBanner(){
  const b=document.getElementById('saveFailBanner');
  if(b)b.remove();
  pendingRetry=null;
}

/* ====================================================================
   حساب المدير الرئيسي: بعد ما تسجّل حسابك الرئيسي، روح لـ Firebase Console
   → Authentication → Users، انسخ الـ UID بتاعت حسابك، واستبدل القيمة دي بيه.
   ==================================================================== */
const ADMIN_UID = "ضع_UID_حساب_المدير_هنا";

function userKvRef(key){
  const uidToUse=state.viewAsUid||state.currentUser.uid;
  return db.collection('users').doc(uidToUse).collection('kv').doc(key);
}
async function sGet(key,shared){
  if(!shared){
    try{const v=localStorage.getItem('local_'+key);return v?JSON.parse(v):null;}
    catch(e){return null;}
  }
  if(!firebaseReady||!state.currentUser)return null;
  try{
    const snap=await userKvRef(key).get();
    if(!snap.exists)return null;
    const data=snap.data();
    return (data&&data.value!==undefined)?JSON.parse(data.value):null;
  }catch(e){return null;}
}
async function sSet(key,value,shared,attempt){
  if(!shared){
    try{
      localStorage.setItem('local_'+key,JSON.stringify(value));
      markSaved();hideSaveFailureBanner();
      return true;
    }catch(e){console.error(e);showSaveFailureBanner(key,value,shared);return false;}
  }
  attempt=attempt||0;
  if(!firebaseReady||!state.currentUser){showSaveFailureBanner(key,value,shared);return false;}
  try{
    await userKvRef(key).set({value:JSON.stringify(value),updatedAt:Date.now()});
    markSaved();
    hideSaveFailureBanner();
    return true;
  }catch(e){
    if(attempt<2){
      await new Promise(res=>setTimeout(res,500));
      return sSet(key,value,shared,attempt+1);
    }
    console.error('SAVE FAILED',key,e);
    showSaveFailureBanner(key,value,shared);
    return false;
  }
}

function usernameToEmail(u){return u.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'')+'@ledgerapp.local';}
function emailToUsername(email){return (email||'').split('@')[0];}

async function init(){
  if(!firebaseReady){
    renderSetupNeeded();
    return;
  }
  firebase.auth().onAuthStateChanged(async(user)=>{
    if(user){
      state.currentUser={uid:user.uid,username:emailToUsername(user.email),name:user.displayName||emailToUsername(user.email)};
      state.companies=(await sGet('companies',true))||[];
      const lastCompany=await sGet('last_company',false);
      if(lastCompany&&state.companies.find(c=>c.id===lastCompany)){
        await loadCompany(lastCompany);
      }
    }else{
      state.currentUser=null;
      state.currentCompanyId=null;
    }
    await renderRoot();
  });
}

  if(!state.currentUser){renderAuthScreen();return;}

async function submitLogin(e){
  e.preventDefault();
  const f=e.target;
  const username=f.username.value.trim();
  const password=f.password.value;
  if(!username||!password)return;
  try{
    await firebase.auth().signInWithEmailAndPassword(usernameToEmail(username),password);
    /* onAuthStateChanged بيكمل الباقي تلقائي */
  }catch(err){
    showToast('اسم المستخدم أو كلمة المرور غير صحيحة');
  }
}

async function submitRegister(e){
  e.preventDefault();
  const f=e.target;
  const name=f.name.value.trim();
  const username=f.username.value.trim();
  const password=f.password.value;
  if(!name||!username||!password)return;
  try{
    const cred=await firebase.auth().createUserWithEmailAndPassword(usernameToEmail(username),password);
    await cred.user.updateProfile({displayName:name});
    state.currentUser={uid:cred.user.uid,username,name};
    await renderRoot();
    try{
      await db.collection('registry').doc(cred.user.uid).set({uid:cred.user.uid,username,name,createdAt:Date.now()});
    }catch(regErr){console.error('registry write failed',regErr);}
  }catch(err){
    if(err.code==='auth/email-already-in-use'){showToast('اسم المستخدم ده محجوز، اختار اسم تاني');}
    else if(err.code==='auth/weak-password'){showToast('كلمة المرور لازم تكون 6 حروف/أرقام على الأقل');}
    else{showToast('حصل خطأ، حاول تاني');console.error(err);}
  }
}

  authMode='login';
  await firebase.auth().signOut();

}

async function submitLedger(e,type){
  e.preventDefault();
  const f=e.target;
  const amount=parseFloat(f.amount.value)||0;
  if(amount<=0)return;
  if(type==='out'&&!f.projectId.value){showToast('اختار مشروع للمصروف أولاً');return;}

function activeWorkers(){return state.workers.filter(w=>!w.archived);}
function archivedWorkers(){return state.workers.filter(w=>w.archived);}
function emptyAttFor(){return {days:[false,false,false,false,false,false,false],ot:[0,0,0,0,0,0,0]};}
function getTransport(){return (state.attendance.__transport&&state.attendance.__transport.length===7)?state.attendance.__transport:[0,0,0,0,0,0,0];}

function workerWeekTotals(worker){
  const att=state.attendance[worker.id]||emptyAttFor();
  const daysWorked=att.days.filter(Boolean).length;
  const otTotal=att.ot.reduce((a,b)=>a+(Number(b)||0),0);
  const hourlyRate=worker.wage/STD_HOURS;
  const total=daysWorked*worker.wage+otTotal*hourlyRate;
  return {daysWorked,otTotal,total,hourlyRate};
}

    <td colspan="3"><strong>إجمالي الانتقالات (لكل الفريق في اليوم)</strong></td>

/* ========================= سند الصرف الأسبوعي ========================= */
async function getOrAssignVoucherSerial(workerId){
  if(state.attendance[workerId]&&state.attendance[workerId].voucherSerial){
    return state.attendance[workerId].voucherSerial;
  }
  let newSerial;
  const serialKey='voucher_serial:'+state.currentCompanyId;
  try{
    if(db.runTransaction){
      const ref=userKvRef(serialKey);
      await db.runTransaction(async(tx)=>{
        const snap=await tx.get(ref);
        const current=(snap.exists&&snap.data().value)?JSON.parse(snap.data().value):0;
        newSerial=current+1;
        tx.set(ref,{value:JSON.stringify(newSerial),updatedAt:Date.now()});
      });
    }else{throw new Error('no transaction support');}
  }catch(e){
    const cur=(await sGet(serialKey,true))||0;
    newSerial=cur+1;
    await sSet(serialKey,newSerial,true);
  }
  if(!state.attendance[workerId])state.attendance[workerId]=emptyAttFor();
  state.attendance[workerId].voucherSerial=newSerial;
  await saveAttendance();
  return newSerial;
}

async function showVoucher(workerId){
  const w=state.workers.find(x=>x.id===workerId);
  if(!w)return;
  const company=state.companies.find(c=>c.id===state.currentCompanyId);
  const project=state.projects.find(p=>p.id===state.currentProjectId);
  const {daysWorked,otTotal,hourlyRate}=workerWeekTotals(w);
  const basePay=daysWorked*w.wage;
  const otPay=otTotal*hourlyRate;
  const total=basePay+otPay;

    <div class="voucher-paper">
      <div class="voucher-head">
        <div class="vh-company">${escapeHtml(company?company.name:'')}</div>
        <div class="vh-title">سند صرف أجور أسبوعي${project?(' — '+escapeHtml(project.name)):''}</div>
        <div class="vh-serial">سند رقم: ${String(serial).padStart(5,'0')}</div>
      </div>
      <table>
        <tr><td>الأسبوع</td><td>${fmtDate(dates[0])} — ${fmtDate(dates[6])}</td></tr>

        <tr><td>الوظيفة</td><td>${escapeHtml(w.type)}${w.craft?' - '+escapeHtml(w.craft):''}</td></tr>
        <tr><td>اليومية</td><td>${fmt(w.wage)}</td></tr>
        <tr><td>أيام الحضور</td><td>${daysWorked} يوم</td></tr>
        <tr><td>قيمة أيام الحضور</td><td>${fmt(basePay)}</td></tr>
        <tr><td>ساعات إضافية</td><td>${fmt(otTotal)} ساعة</td></tr>
        <tr><td>قيمة الساعات الإضافية</td><td>${fmt(otPay)}</td></tr>
        <tr class="voucher-total-row"><td>الإجمالي المستحق</td><td>${fmt(total)} جنيه</td></tr>
      </table>
      <div class="voucher-sign-row">
        <div>توقيع المستلم: ‎_______________</div>
        <div>توقيع المحاسب: ‎_______________</div>
      </div>
      <div class="voucher-foot">تاريخ الإصدار: ${fmtDate(toISO(new Date()))} — ${escapeHtml(state.currentUser.name)}</div>
      <div class="voucher-actions">
        <button class="voucher-print-btn" id="voucherPrintBtn">طباعة السند</button>
        <button class="voucher-close-btn" id="voucherCloseBtn">إغلاق</button>
      </div>
    </div>
  `;
  document.getElementById('voucherPrintBtn').addEventListener('click',()=>window.print());
  document.getElementById('voucherCloseBtn').addEventListener('click',()=>overlay.remove());
  overlay.addEventListener('click',(e)=>{if(e.target===overlay)overlay.remove();});
}

async function exportLedgerReport(){
  const btn=document.getElementById('exportLedgerBtn');
  btn.disabled=true;
  const oldText=btn.innerHTML;
  btn.innerHTML='<span>...</span> جاري التصدير';
  try{
    const company=state.companies.find(c=>c.id===state.currentCompanyId);
    const sorted=[...state.ledger.entries].sort((a,b)=>a.date.localeCompare(b.date)||a.createdAt-b.createdAt);
    let running=0;
    const header=['التاريخ','النوع','المشروع','البيان','المبلغ','الرصيد بعده','سجّلها','الفاتورة'];
    const rows=sorted.map(e=>{
      running+=e.type==='in'?e.amount:-e.amount;
      const proj=state.projects.find(p=>p.id===e.projectId);
      return [fmtDate(e.date),e.type==='in'?'استلام عهدة':'مصروف',proj?proj.name:'',e.note||'',e.type==='in'?e.amount:-e.amount,running,e.by||'',e.imageUrl?'عرض الصورة':''];
    });
    const {totalIn,totalOut,balance}=ledgerTotals();
    rows.push([]);
    rows.push(['إجمالي العهدة المستلمة','','','','',totalIn,'','']);
    rows.push(['إجمالي المصروفات','','','','',totalOut,'','']);
    rows.push(['المتبقي','','','','',balance,'','']);
    const titleLines=[(company?company.name:''),'سجل العهدة الكامل'];
    const ws=buildTitledSheet(titleLines,header,rows,[12,12,18,28,12,12,16,12],[4,5]);
    const dataStartRow=titleLines.length+2;
    sorted.forEach((e,i)=>{
      if(e.imageUrl){
        const addr=XLSX.utils.encode_cell({r:dataStartRow+i,c:7});
        if(ws[addr])ws[addr].l={Target:e.imageUrl,Tooltip:'فتح صورة الفاتورة'};
      }
    });
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'سجل العهدة');
    const fname=(company?company.name:'شركة').replace(/[\\/:*?"<>|]/g,'_')+'_عهدة.xlsx';
    XLSX.writeFile(wb,fname);
  }catch(err){
    console.error(err);
    alert('حصل خطأ أثناء إنشاء ملف Excel. حاول تاني.');
  }finally{
    btn.disabled=false;
    btn.innerHTML=oldText;
  }
}

/* ========================= التصدير ========================= */
function applyNumberFormat(ws,colIndexes,startRow,endRow,fmtStr){
  fmtStr=fmtStr||'#,##0.00';
  for(let r=startRow;r<=endRow;r++){
    colIndexes.forEach(c=>{
      const addr=XLSX.utils.encode_cell({r:r,c:c});
      if(ws[addr]&&typeof ws[addr].v==='number'){ws[addr].z=fmtStr;}
    });
  }
}
function buildTitledSheet(titleLines,headerRow,dataRows,colWidths,amountCols){
  const aoa=[];
  titleLines.forEach(t=>aoa.push([t]));
  aoa.push([]);
  aoa.push(headerRow);
  dataRows.forEach(r=>aoa.push(r));
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const ncols=headerRow.length;
  ws['!merges']=titleLines.map((_,i)=>({s:{r:i,c:0},e:{r:i,c:ncols-1}}));
  if(colWidths)ws['!cols']=colWidths.map(w=>({wch:w}));
  if(amountCols&&dataRows.length)applyNumberFormat(ws,amountCols,titleLines.length+2,aoa.length-1);
  return ws;
}

async function exportWorkforceReport(){
  const btn=document.getElementById('exportWeekBtn');
  btn.disabled=true;
  const oldText=btn.innerHTML;
  btn.innerHTML='<span>...</span> جاري التصدير';
  try{
    const company=state.companies.find(c=>c.id===state.currentCompanyId);
    const project=state.projects.find(p=>p.id===state.currentProjectId);
    const wb=XLSX.utils.book_new();

    let allWeeks=[...state.weeksList];
    if(!allWeeks.includes(state.weekStart))allWeeks.push(state.weekStart);
    allWeeks.sort();

    const weekData={};
    for(const wk of allWeeks){
      if(wk===state.weekStart){weekData[wk]=state.attendance;}
      else{weekData[wk]=(await sGet('att:'+state.currentCompanyId+':'+state.currentProjectId+':'+wk,true))||{};}
    }

    const workersAll=state.workers;
    const wfHeader=['العامل','النوع','الصنعة','اليومية',...DAYS.map(d=>d.label),'أيام الحضور','ساعات إضافي','الإجمالي المستحق'];
    const wfColWidths=[18,10,14,10,8,8,8,8,8,8,8,12,12,14];
    allWeeks.forEach(wk=>{
      const wdata=weekData[wk];
      const dates=weekDates(wk);
      const rows=[];
      workersAll.forEach(w=>{
        const att=wdata[w.id]||emptyAttFor();
        const daysWorked=att.days.filter(Boolean).length;
        const otTotal=att.ot.reduce((a,b)=>a+(Number(b)||0),0);
        const hourlyRate=w.wage/STD_HOURS;
        const total=daysWorked*w.wage+otTotal*hourlyRate;
        if(daysWorked===0&&otTotal===0)return;
        rows.push([w.name,w.type,w.craft||'',w.wage,...att.days.map(d=>d?'حاضر':'-'),daysWorked,otTotal,total]);
      });
      const transport=(wdata.__transport&&wdata.__transport.length===7)?wdata.__transport:[0,0,0,0,0,0,0];
      rows.push(['إجمالي الانتقالات','','','',...transport,'','',transport.reduce((a,b)=>a+(Number(b)||0),0)]);
      if(rows.length>1){
        const titleLines=[
          (company?company.name:'')+(project?(' — '+project.name):''),
          'تقرير عمالة أسبوعي — من '+fmtDate(dates[0])+' إلى '+fmtDate(dates[6])
        ];
        const ws=buildTitledSheet(titleLines,wfHeader,rows,wfColWidths,[3,wfHeader.length-1]);
        XLSX.utils.book_append_sheet(wb,ws,'اسبوع '+wk);
      }
    });

    const summaryHeader=['العامل','النوع','الصنعة','اليومية','إجمالي أيام الحضور','إجمالي ساعات الإضافي','إجمالي المستحق'];
    const summaryRows=[];
    let grandTransport=0;
    workersAll.forEach(w=>{
      let totalDays=0,totalOt=0,totalPay=0;
      allWeeks.forEach(wk=>{
        const att=weekData[wk][w.id]||emptyAttFor();
        const daysWorked=att.days.filter(Boolean).length;
        const otTotal=att.ot.reduce((a,b)=>a+(Number(b)||0),0);
        const hourlyRate=w.wage/STD_HOURS;
        totalDays+=daysWorked;totalOt+=otTotal;
        totalPay+=daysWorked*w.wage+otTotal*hourlyRate;
      });
      summaryRows.push([w.name,w.type,w.craft||'',w.wage,totalDays,totalOt,totalPay]);
    });
    allWeeks.forEach(wk=>{
      const t=(weekData[wk].__transport&&weekData[wk].__transport.length===7)?weekData[wk].__transport:[0,0,0,0,0,0,0];
      grandTransport+=t.reduce((a,b)=>a+(Number(b)||0),0);
    });
    summaryRows.push([]);
    summaryRows.push(['إجمالي الانتقالات (كل الأسابيع)','','','','','',grandTransport]);
    const summaryTitle=[(company?company.name:'')+(project?(' — '+project.name):''),'ملخص أجور العمال — كل الأسابيع المسجَّلة'];
    const wsSummary=buildTitledSheet(summaryTitle,summaryHeader,summaryRows,[18,10,14,10,16,16,14],[3,6]);
    XLSX.utils.book_append_sheet(wb,wsSummary,'ملخص العمال');

    const fname=(project?project.name:'مشروع').replace(/[\\/:*?"<>|]/g,'_')+'_عمالة.xlsx';
    XLSX.writeFile(wb,fname);
  }catch(err){
    console.error(err);
    alert('حصل خطأ أثناء إنشاء ملف Excel. حاول تاني.');
  }finally{
    btn.disabled=false;
    btn.innerHTML=oldText;
  }
}
